<html>
<head>
<title>Formulario</title>
</head>

<body style="background-color: rgb(185, 213, 230); font-family: Arial;">

<br><br>

<table align="center" border="1" cellpadding="10" style="background-color: white;">

<tr>
<td>

<form name="formulario" method="post" action="/send/">

<h2 style="color: blue; text-align: center;">Formulario Básico</h2>

<label>Primer nombre:</label><br>
<input type="text"><br><br>

<label>Segundo nombre:</label><br>
<input type="text"><br><br>

<label>Apellidos:</label><br>
<input type="text"><br><br>

<label>Tipo de documento:</label><br>
<select>
<option>Cédula</option>
<option>Tarjeta de identidad</option>
<option>Pasaporte</option>
</select><br><br>

<label>Número de documento:</label><br>
<input type="number"><br><br>

<label>Fecha de nacimiento:</label><br>
<input type="date"><br><br>

<label>Correo electrónico:</label><br>
<input type="email"><br><br>

<label>Teléfono:</label><br>
<input type="number"><br><br>

<label>Dirección:</label><br>
<input type="text"><br><br>

<label>Ciudad:</label><br>
<input type="text"><br><br>

<label>Área de interés:</label><br>
<select>
<option>Desarrollo web</option>
<option>Cyberseguridad</option>
<option>Animacion 3d</option>
</select><br><br>

<label>Disponibilidad:</label><br>
<input type="radio" name="disp"> Tiempo completo<br>
<input type="radio" name="disp"> Medio tiempo<br><br>

<label>Habilidades:</label><br>
<input type="checkbox"> HTML<br>
<input type="checkbox"> Python<br>
<input type="checkbox"> Java<br><br>


<label>Mensaje:</label><br>
<textarea rows="4" cols="30"></textarea><br><br>


<center>
<input type="submit" value="Enviar">
</center>

</form>

</td>
</tr>

</table>

</body>
</html>
